<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>双安驾校管理后台</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; background: #f5f6fa; min-height: 100vh; }
    .container { max-width: 900px; margin: 0 auto; padding: 20px; }
    h1 { text-align: center; color: #2ecc71; margin-bottom: 24px; font-size: 1.8rem; }
    .card { background: white; border-radius: 16px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
    .form-row { display: flex; gap: 10px; margin-bottom: 12px; }
    .form-row input { flex: 1; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 0.95rem; }
    input:focus { outline: none; border-color: #2ecc71; }
    button { padding: 10px 20px; background: linear-gradient(135deg, #2ecc71, #27ae60); color: white; border: none; border-radius: 10px; font-size: 0.95rem; cursor: pointer; }
    .btn-sm { padding: 6px 12px; font-size: 0.85rem; }
    .btn-danger { background: linear-gradient(135deg, #e74c3c, #c0392b); }
    .btn-secondary { background: linear-gradient(135deg, #95a5a6, #7f8c8d); }
    .student-table { width: 100%; border-collapse: collapse; }
    .student-table th, .student-table td { padding: 12px; text-align: left; border-bottom: 1px solid #eee; }
    .student-table th { background: #f8f9fa; color: #666; font-weight: 500; }
    .input-group { display: flex; gap: 10px; margin-bottom: 12px; }
    .input-group input { flex: 1; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 0.95rem; }
    .tab-bar { display: flex; gap: 4px; background: #f0f0f0; padding: 4px; border-radius: 12px; margin-bottom: 20px; }
    .tab-btn { padding: 10px 16px; background: none; border: none; border-radius: 10px; font-size: 0.9rem; cursor: pointer; color: #666; }
    .tab-btn.active { background: white; color: #2ecc71; }
    .tab-content { display: none; }
    .tab-content.active { display: block; }
    .stat-grid { display: grid; grid-template-columns: repeat(3, 1fr); gap: 12px; margin-bottom: 20px; }
    .stat-item { background: linear-gradient(135deg, #2ecc71, #27ae60); border-radius: 16px; padding: 20px; text-align: center; color: white; }
    .stat-item.orange { background: linear-gradient(135deg, #f39c12, #e67e22); }
    .stat-item.blue { background: linear-gradient(135deg, #3498db, #2980b9); }
    .stat-number { font-size: 2rem; font-weight: bold; }
    .stat-label { font-size: 0.9rem; opacity: 0.9; }
    .notice-list { list-style: none; }
    .notice-item { padding: 14px; background: #f8f9fa; border-radius: 10px; margin-bottom: 10px; }
    .module-grid { display: grid; grid-template-columns: repeat(2, 1fr); gap: 16px; }
    .module-card { background: white; border-radius: 16px; padding: 20px; text-align: center; cursor: pointer; border: 2px solid #eee; }
    .module-card:hover { border-color: #2ecc71; }
    .module-icon { font-size: 2.5rem; margin-bottom: 8px; }
    .module-name { font-size: 1.1rem; font-weight: 600; color: #333; }
    .module-links { font-size: 0.85rem; color: #666; margin-top: 4px; }
    .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.5); z-index: 1000; justify-content: center; align-items: center; }
    .modal.active { display: flex; }
    .modal-content { background: white; border-radius: 16px; padding: 24px; width: 90%; max-width: 500px; }
    .modal-title { font-size: 1.2rem; color: #333; margin-bottom: 16px; }
    .modal-row { margin-bottom: 12px; }
    .modal-row label { display: block; color: #666; font-size: 0.85rem; margin-bottom: 4px; }
    .modal-row input { width: 100%; padding: 10px 14px; border: 2px solid #e0e0e0; border-radius: 10px; font-size: 0.95rem; }
    .modal-buttons { display: flex; gap: 10px; justify-content: flex-end; margin-top: 16px; }
    .empty-state { text-align: center; color: #999; padding: 30px; }
    .toast { position: fixed; bottom: 30px; left: 50%; transform: translateX(-50%); background: #333; color: white; padding: 12px 24px; border-radius: 8px; font-size: 0.95rem; z-index: 2000; opacity: 0; transition: opacity 0.3s; }
    .toast.show { opacity: 1; }
    .header-actions { display: flex; gap: 10px; justify-content: center; margin-bottom: 20px; }
    .preview-link { display: inline-block; padding: 10px 20px; background: linear-gradient(135deg, #9b59b6, #8e44ad); color: white; border-radius: 10px; text-decoration: none; }
    .link-list { list-style: none; }
    .link-item { padding: 12px; background: #f8f9fa; border-radius: 8px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; }
    .link-item a { color: #2ecc71; text-decoration: none; flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
  </style>
</head>
<body>
  <div class="container">
    <h1>双安驾校管理后台</h1>
    <div class="header-actions">
      <a href="home.html" class="preview-link" target="_blank">预览招生页面</a>
    </div>
    <div class="tab-bar">
      <button class="tab-btn active" onclick="switchTab('students')">报名学员</button>
      <button class="tab-btn" onclick="switchTab('notices')">公告管理</button>
      <button class="tab-btn" onclick="switchTab('modules')">实用服务</button>
    </div>
    <div id="tab-students" class="tab-content active">
      <div class="stat-grid">
        <div class="stat-item"><div class="stat-number" id="totalStudents">0</div><div class="stat-label">总报名人数</div></div>
        <div class="stat-item orange"><div class="stat-number" id="todayStudents">0</div><div class="stat-label">今日报名</div></div>
        <div class="stat-item blue"><div class="stat-number" id="monthStudents">0</div><div class="stat-label">本月报名</div></div>
      </div>
      <div class="card">
        <table class="student-table"><thead><tr><th>姓名</th><th>电话</th><th>时间</th><th>操作</th></tr></thead><tbody id="studentTable"></tbody></table>
      </div>
    </div>
    <div id="tab-notices" class="tab-content">
      <div class="card">
        <div class="input-group">
          <input type="text" id="noticeInput" placeholder="输入公告内容...">
          <button onclick="addNotice()">发布</button>
        </div>
      </div>
      <ul class="notice-list" id="noticeList"></ul>
    </div>
    <div id="tab-modules" class="tab-content">
      <div class="card">
        <button onclick="openAddModule()">添加模块</button>
      </div>
      <div class="module-grid" id="moduleGrid"></div>
    </div>
  </div>

  <div class="modal" id="addModuleModal">
    <div class="modal-content">
      <div class="modal-title">添加模块</div>
      <div class="modal-row">
        <label>模块名称</label>
        <input type="text" id="moduleNameInput" placeholder="如：科目二">
      </div>
      <div class="modal-row">
        <label>图标（输入emoji，如🚗）</label>
        <input type="text" id="moduleIconInput" placeholder="🚗">
      </div>
      <div class="modal-buttons">
        <button class="btn-secondary" onclick="closeModal('addModuleModal')">取消</button>
        <button onclick="addModule()">添加</button>
      </div>
    </div>
  </div>

  <div class="modal" id="editModuleModal">
    <div class="modal-content">
      <div class="modal-title" id="editModuleTitle">管理模块</div>
      <ul class="link-list" id="moduleLinksList"></ul>
      <div class="modal-row">
        <input type="text" id="linkNameInput" placeholder="链接名称">
      </div>
      <div class="modal-row">
        <input type="text" id="linkUrlInput" placeholder="https://">
      </div>
      <div class="modal-buttons">
        <button class="btn-secondary" onclick="closeModal('editModuleModal')">关闭</button>
        <button onclick="addLink()">添加链接</button>
      </div>
    </div>
  </div>

  <div class="toast" id="toast"></div>

  <script>
    var API_URL = 'https://iinoqavrthukxojfalnu.supabase.co/rest/v1';
    var API_KEY = 'sb_publishable_MT642GRvmSaI1anfLijpZw_3JyclrMm';
    var schoolData = { id: null, name: '双安驾校' };
    var students = [];
    var notices = [];
    var modules = [];
    var currentModule = null;

    function apiFetch(endpoint, callback) {
      var url = API_URL + '/' + endpoint;
      var xhr = new XMLHttpRequest();
      xhr.open('GET', url, true);
      xhr.setRequestHeader('apikey', API_KEY);
      xhr.setRequestHeader('Authorization', 'Bearer ' + API_KEY);
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 200) {
            try {
              var data = JSON.parse(xhr.responseText);
              callback(null, data);
            } catch(e) {
              callback(e);
            }
          } else {
            callback(new Error('请求失败'));
          }
        }
      };
      xhr.send();
    }

    function apiPost(endpoint, body, callback) {
      var url = API_URL + '/' + endpoint;
      var xhr = new XMLHttpRequest();
      xhr.open('POST', url, true);
      xhr.setRequestHeader('apikey', API_KEY);
      xhr.setRequestHeader('Authorization', 'Bearer ' + API_KEY);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Prefer', 'return=minimal');
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 201 || xhr.status === 204) {
            callback(null);
          } else {
            callback(new Error('请求失败'));
          }
        }
      };
      xhr.send(JSON.stringify(body));
    }

    function apiPatch(endpoint, body, callback) {
      var url = API_URL + '/' + endpoint;
      var xhr = new XMLHttpRequest();
      xhr.open('PATCH', url, true);
      xhr.setRequestHeader('apikey', API_KEY);
      xhr.setRequestHeader('Authorization', 'Bearer ' + API_KEY);
      xhr.setRequestHeader('Content-Type', 'application/json');
      xhr.setRequestHeader('Prefer', 'return=minimal');
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 204) {
            callback(null);
          } else {
            callback(new Error('请求失败'));
          }
        }
      };
      xhr.send(JSON.stringify(body));
    }

    function apiDelete(endpoint, callback) {
      var url = API_URL + '/' + endpoint;
      var xhr = new XMLHttpRequest();
      xhr.open('DELETE', url, true);
      xhr.setRequestHeader('apikey', API_KEY);
      xhr.setRequestHeader('Authorization', 'Bearer ' + API_KEY);
      xhr.setRequestHeader('Prefer', 'return=minimal');
      xhr.onreadystatechange = function() {
        if (xhr.readyState === 4) {
          if (xhr.status === 204 || xhr.status === 200) {
            callback(null);
          } else {
            callback(new Error('请求失败'));
          }
        }
      };
      xhr.send();
    }

    function loadData() {
      apiFetch('school?select=*&limit=1', function(err, data) {
        if (!err && data && data[0]) schoolData = data[0];
      });
      apiFetch('enrollments?select=*&order=created_at.desc', function(err, data) {
        students = data || [];
        renderStudents();
        updateStats();
      });
      apiFetch('notices?select=*&order=date.desc', function(err, data) {
        notices = data || [];
        renderNotices();
      });
      apiFetch('modules?select=*', function(err, data) {
        modules = data || [];
        renderModules();
      });
    }

    function renderStudents() {
      var tbody = document.getElementById('studentTable');
      if (students.length === 0) {
        tbody.innerHTML = '<tr><td colspan="4" class="empty-state">暂无报名学员</td></tr>';
        return;
      }
      var html = '';
      for (var i = 0; i < students.length; i++) {
        var s = students[i];
        html += '<tr><td>' + escapeHtml(s.name) + '</td><td>' + escapeHtml(s.phone) + '</td><td>' + formatDate(s.created_at) + '</td><td><button class="btn-sm btn-danger" onclick="deleteStudent(\'' + s.id + '\')">删除</button></td></tr>';
      }
      tbody.innerHTML = html;
    }

    function renderNotices() {
      var list = document.getElementById('noticeList');
      if (notices.length === 0) {
        list.innerHTML = '<li class="empty-state">暂无公告</li>';
        return;
      }
      var html = '';
      for (var i = 0; i < notices.length; i++) {
        var n = notices[i];
        html += '<li class="notice-item"><div>' + escapeHtml(n.text) + '</div><div style="color:#999;font-size:0.8rem;margin-top:4px">' + formatDate(n.date || n.created_at) + '</div></li>';
      }
      list.innerHTML = html;
    }

    function renderModules() {
      var grid = document.getElementById('moduleGrid');
      if (modules.length === 0) {
        grid.innerHTML = '<div class="empty-state">暂无模块</div>';
        return;
      }
      var html = '';
      for (var i = 0; i < modules.length; i++) {
        var m = modules[i];
        var links = [];
        try { links = JSON.parse(m.links || '[]'); } catch(e) { links = []; }
        html += '<div class="module-card" onclick="openModule(\'' + m.id + '\')"><div class="module-icon">' + (m.icon || '📁') + '</div><div class="module-name">' + escapeHtml(m.name) + '</div><div class="module-links">' + links.length + ' 个链接</div></div>';
      }
      grid.innerHTML = html;
    }

    function updateStats() {
      document.getElementById('totalStudents').textContent = students.length;
      var today = new Date().toDateString();
      var todayCount = 0;
      for (var i = 0; i < students.length; i++) {
        if (new Date(students[i].created_at).toDateString() === today) todayCount++;
      }
      document.getElementById('todayStudents').textContent = todayCount;
      var month = new Date().getMonth();
      var year = new Date().getFullYear();
      var monthCount = 0;
      for (var i = 0; i < students.length; i++) {
        var d = new Date(students[i].created_at);
        if (d.getMonth() === month && d.getFullYear() === year) monthCount++;
      }
      document.getElementById('monthStudents').textContent = monthCount;
    }

    function deleteStudent(id) {
      if (!confirm('确定删除？')) return;
      apiDelete('enrollments?id=eq.' + id, function(err) {
        if (!err) {
          students = students.filter(function(s) { return s.id !== id; });
          renderStudents();
          updateStats();
          showToast('已删除');
        } else {
          showToast('删除失败');
        }
      });
    }

    function addNotice() {
      var text = document.getElementById('noticeInput').value.trim();
      if (!text) return;
      apiPost('notices', { text: text, date: new Date().toISOString() }, function(err) {
        if (!err) {
          notices.unshift({ id: Date.now(), text: text, date: new Date().toISOString() });
          document.getElementById('noticeInput').value = '';
          renderNotices();
          showToast('发布成功');
        } else {
          showToast('发布失败');
        }
      });
    }

    function openAddModule() {
      document.getElementById('moduleNameInput').value = '';
      document.getElementById('moduleIconInput').value = '';
      document.getElementById('addModuleModal').classList.add('active');
    }

    function addModule() {
      var name = document.getElementById('moduleNameInput').value.trim();
      var icon = document.getElementById('moduleIconInput').value.trim() || '📁';
      if (!name) return;
      apiPost('modules', { name: name, icon: icon, links: '[]' }, function(err) {
        if (!err) {
          modules.push({ id: Date.now(), name: name, icon: icon, links: '[]' });
          closeModal('addModuleModal');
          renderModules();
          showToast('添加成功');
        } else {
          showToast('添加失败');
        }
      });
    }

    function openModule(id) {
      currentModule = modules.find(function(m) { return m.id == id; });
      if (!currentModule) return;
      document.getElementById('editModuleTitle').textContent = currentModule.name;
      var links = [];
      try { links = JSON.parse(currentModule.links || '[]'); } catch(e) { links = []; }
      var list = document.getElementById('moduleLinksList');
      if (links.length === 0) {
        list.innerHTML = '<li class="empty-state">暂无链接</li>';
      } else {
        var html = '';
        for (var i = 0; i < links.length; i++) {
          html += '<li class="link-item"><a href="#" onclick="openUrl(\'' + escapeHtml(links[i].url) + '\');return false;">' + escapeHtml(links[i].name) + '</a><button class="btn-sm btn-danger" onclick="deleteLink(' + i + ')">删除</button></li>';
        }
        list.innerHTML = html;
      }
      document.getElementById('editModuleModal').classList.add('active');
    }

    function openUrl(url) {
      window.open(url, '_blank');
    }

    function deleteLink(index) {
      if (!currentModule) return;
      if (!confirm('确定删除该链接？')) return;
      var links = [];
      try { links = JSON.parse(currentModule.links || '[]'); } catch(e) { links = []; }
      links.splice(index, 1);
      apiPatch('modules?id=eq.' + currentModule.id, { links: JSON.stringify(links) }, function(err) {
        if (!err) {
          currentModule.links = JSON.stringify(links);
          openModule(currentModule.id);
          renderModules();
          showToast('已删除');
        } else {
          showToast('删除失败');
        }
      });
    }

    function addLink() {
      if (!currentModule) return;
      var name = document.getElementById('linkNameInput').value.trim();
      var url = document.getElementById('linkUrlInput').value.trim();
      if (!name || !url) return;
      if (!url.match(/^https?:\/\//)) url = 'https://' + url;
      var links = [];
      try { links = JSON.parse(currentModule.links || '[]'); } catch(e) { links = []; }
      links.push({ name: name, url: url });
      apiPatch('modules?id=eq.' + currentModule.id, { links: JSON.stringify(links) }, function(err) {
        if (!err) {
          currentModule.links = JSON.stringify(links);
          document.getElementById('linkNameInput').value = '';
          document.getElementById('linkUrlInput').value = '';
          openModule(currentModule.id);
          renderModules();
          showToast('添加成功');
        } else {
          showToast('添加失败');
        }
      });
    }

    function closeModal(id) {
      document.getElementById(id).classList.remove('active');
    }

    function switchTab(tab) {
      var btns = document.querySelectorAll('.tab-btn');
      var contents = document.querySelectorAll('.tab-content');
      for (var i = 0; i < btns.length; i++) btns[i].classList.remove('active');
      for (var i = 0; i < contents.length; i++) contents[i].classList.remove('active');
      if (tab === 'students') btns[0].classList.add('active');
      else if (tab === 'notices') btns[1].classList.add('active');
      else if (tab === 'modules') btns[2].classList.add('active');
      document.getElementById('tab-' + tab).classList.add('active');
    }

    function formatDate(str) {
      if (!str) return '-';
      var d = new Date(str);
      return d.getFullYear() + '-' + pad(d.getMonth()+1) + '-' + pad(d.getDate()) + ' ' + pad(d.getHours()) + ':' + pad(d.getMinutes());
    }

    function pad(n) { return n < 10 ? '0' + n : n; }

    function escapeHtml(text) {
      if (!text) return '';
      var div = document.createElement('div');
      div.textContent = text;
      return div.innerHTML;
    }

    function showToast(msg) {
      var t = document.getElementById('toast');
      t.textContent = msg;
      t.classList.add('show');
      setTimeout(function() { t.classList.remove('show'); }, 2000);
    }

    document.getElementById('addModuleModal').addEventListener('click', function(e) {
      if (e.target === document.getElementById('addModuleModal')) closeModal('addModuleModal');
    });
    document.getElementById('editModuleModal').addEventListener('click', function(e) {
      if (e.target === document.getElementById('editModuleModal')) closeModal('editModuleModal');
    });

    loadData();
  </script>
</body>
</html>
