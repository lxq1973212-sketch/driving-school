<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>双安驾校 - 管理后台</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: #f5f5f5; min-height: 100vh; }
        .container { max-width: 1200px; margin: 0 auto; padding: 20px; }
        .header { background: linear-gradient(135deg, #1890ff 0%, #0050b3 100%); color: white; padding: 24px 20px; border-radius: 12px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        .header h1 { font-size: 20px; }
        .header-stats { display: flex; gap: 24px; }
        .stat-item { text-align: center; }
        .stat-value { font-size: 24px; font-weight: bold; }
        .stat-label { font-size: 12px; opacity: 0.8; }
        .card { background: white; border-radius: 12px; padding: 20px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .card-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .tabs { display: flex; gap: 8px; margin-bottom: 16px; flex-wrap: wrap; }
        .tab { padding: 8px 16px; font-size: 14px; color: #666; background: #f5f5f5; border: none; border-radius: 6px; cursor: pointer; transition: all 0.3s; }
        .tab.active { background: #1890ff; color: white; }
        .tab:hover:not(.active) { background: #e6e6e6; }
        .search-bar { display: flex; gap: 12px; margin-bottom: 16px; flex-wrap: wrap; }
        .search-bar input, .search-bar select { padding: 10px 14px; font-size: 14px; border: 1px solid #d9d9d9; border-radius: 6px; outline: none; }
        .search-bar input { flex: 1; min-width: 200px; }
        .search-bar input:focus, .search-bar select:focus { border-color: #1890ff; }
        .btn { padding: 8px 16px; font-size: 14px; border: none; border-radius: 6px; cursor: pointer; transition: all 0.3s; }
        .btn-primary { background: #1890ff; color: white; }
        .btn-primary:hover { background: #40a9ff; }
        .btn-danger { background: #ff4d4f; color: white; }
        .btn-danger:hover { background: #ff7875; }
        .btn-success { background: #52c41a; color: white; }
        .btn-success:hover { background: #73d13d; }
        .btn-small { padding: 4px 12px; font-size: 12px; }
        table { width: 100%; border-collapse: collapse; }
        th, td { padding: 12px; text-align: left; border-bottom: 1px solid #f0f0f0; }
        th { background: #fafafa; font-weight: 500; color: #333; font-size: 14px; }
        td { font-size: 14px; color: #666; }
        tr:hover { background: #fafafa; }
        .status-badge { display: inline-block; padding: 2px 8px; font-size: 12px; border-radius: 4px; }
        .status-pending { background: #fffbe6; color: #fa8c16; }
        .status-confirmed { background: #e6f7ff; color: #1890ff; }
        .status-completed { background: #f6ffed; color: #52c41a; }
        .status-cancelled { background: #fff1f0; color: #ff4d4f; }
        .actions { display: flex; gap: 8px; }
        .modal { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 1000; padding: 20px; }
        .modal.active { display: flex; }
        .modal-content { background: white; border-radius: 12px; width: 100%; max-width: 500px; max-height: 90vh; overflow-y: auto; }
        .modal-header { padding: 16px 20px; border-bottom: 1px solid #f0f0f0; display: flex; justify-content: space-between; align-items: center; }
        .modal-title { font-size: 16px; font-weight: 600; color: #333; }
        .modal-close { width: 32px; height: 32px; display: flex; justify-content: center; align-items: center; cursor: pointer; color: #999; font-size: 20px; }
        .modal-close:hover { color: #333; }
        .modal-body { padding: 20px; }
        .modal-footer { padding: 16px 20px; border-top: 1px solid #f0f0f0; display: flex; justify-content: flex-end; gap: 12px; }
        .form-row { margin-bottom: 16px; }
        .form-row:last-child { margin-bottom: 0; }
        .form-row label { display: block; font-size: 14px; color: #666; margin-bottom: 8px; }
        .form-row label span { color: #ff4d4f; margin-left: 4px; }
        .form-row input, .form-row select, .form-row textarea { width: 100%; padding: 10px 14px; font-size: 14px; border: 1px solid #d9d9d9; border-radius: 6px; outline: none; }
        .form-row input:focus, .form-row select:focus, .form-row textarea:focus { border-color: #1890ff; }
        .form-row textarea { resize: vertical; min-height: 80px; }
        .message { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 1001; display: none; }
        .message.success { background: #f6ffed; border: 1px solid #b7eb8f; color: #52c41a; }
        .message.error { background: #fff2f0; border: 1px solid #ffccc7; color: #ff4d4f; }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 999; }
        .loading-overlay.active { display: flex; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .empty-state { text-align: center; padding: 60px 20px; color: #999; }
        .empty-state svg { width: 80px; height: 80px; margin-bottom: 16px; opacity: 0.5; }
        .empty-state p { font-size: 14px; }
        .pagination { display: flex; justify-content: center; align-items: center; gap: 8px; margin-top: 20px; }
        .pagination button { padding: 8px 14px; font-size: 14px; border: 1px solid #d9d9d9; background: white; border-radius: 6px; cursor: pointer; }
        .pagination button:hover:not(:disabled) { border-color: #1890ff; color: #1890ff; }
        .pagination button:disabled { color: #d9d9d9; cursor: not-allowed; }
        .pagination span { font-size: 14px; color: #666; }
        .toast { position: fixed; bottom: 100px; left: 50%; transform: translateX(-50%); background: rgba(0,0,0,0.75); color: white; padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 1001; display: none; }
        .toast.show { display: block; }
        @media (max-width: 768px) {
            .header { flex-direction: column; gap: 16px; text-align: center; }
            .header-stats { justify-content: center; }
            .search-bar { flex-direction: column; }
            .search-bar input, .search-bar select { width: 100%; }
            .actions { flex-wrap: wrap; }
            table { display: block; overflow-x: auto; }
            .modal-content { margin: 0 10px; }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>双安驾校管理后台</h1>
            <div class="header-stats">
                <div class="stat-item">
                    <div class="stat-value" id="totalCount">0</div>
                    <div class="stat-label">总报名</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="todayCount">0</div>
                    <div class="stat-label">今日新增</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="pendingCount">0</div>
                    <div class="stat-label">待处理</div>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-title">
                <span>报名列表</span>
                <button class="btn btn-primary btn-small" onclick="openAddModal()">添加报名</button>
            </div>
            <div class="tabs">
                <button class="tab active" data-status="">全部</button>
                <button class="tab" data-status="pending">待处理</button>
                <button class="tab" data-status="confirmed">已确认</button>
                <button class="tab" data-status="completed">已完成</button>
                <button class="tab" data-status="cancelled">已取消</button>
            </div>
            <div class="search-bar">
                <input type="text" id="searchInput" placeholder="搜索姓名、手机号、身份证号...">
                <select id="licenseFilter">
                    <option value="">全部驾照类型</option>
                    <option value="C1">C1</option>
                    <option value="C2">C2</option>
                </select>
                <select id="studyFilter">
                    <option value="">全部班型</option>
                    <option value="普通班">普通班</option>
                    <option value="VIP班">VIP班</option>
                </select>
                <button class="btn btn-primary" onclick="loadData()">搜索</button>
                <button class="btn" onclick="resetSearch()">重置</button>
            </div>
            <div id="tableContainer">
                <table>
                    <thead>
                        <tr>
                            <th>姓名</th>
                            <th>手机号</th>
                            <th>身份证号</th>
                            <th>性别</th>
                            <th>驾照类型</th>
                            <th>班型</th>
                            <th>状态</th>
                            <th>报名时间</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody id="tableBody"></tbody>
                </table>
                <div class="empty-state" id="emptyState" style="display:none;">
                    <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                    <p>暂无报名数据</p>
                </div>
            </div>
            <div class="pagination" id="pagination"></div>
        </div>

        <div class="card">
            <div class="card-title">服务项目管理</div>
            <div style="margin-bottom: 16px;">
                <button class="btn btn-primary btn-small" onclick="openServiceModal()">添加服务</button>
            </div>
            <table>
                <thead>
                    <tr>
                        <th>序号</th>
                        <th>标题</th>
                        <th>价格</th>
                        <th>创建时间</th>
                        <th>操作</th>
                    </tr>
                </thead>
                <tbody id="serviceTableBody"></tbody>
            </table>
            <div class="empty-state" id="serviceEmptyState" style="display:none;">
                <svg viewBox="0 0 24 24" fill="currentColor"><path d="M19 3H5c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h14c1.1 0 2-.9 2-2V5c0-1.1-.9-2-2-2zm-5 14H7v-2h7v2zm3-4H7v-2h10v2zm0-4H7V7h10v2z"/></svg>
                <p>暂无服务数据</p>
            </div>
        </div>
    </div>

    <div class="modal" id="enrollmentModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title" id="modalTitle">添加报名</span>
                <span class="modal-close" onclick="closeModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="enrollmentForm">
                    <input type="hidden" id="enrollmentId">
                    <div class="form-row">
                        <label>姓名 <span>*</span></label>
                        <input type="text" id="name" required maxlength="20" placeholder="请输入姓名">
                    </div>
                    <div class="form-row">
                        <label>手机号码 <span>*</span></label>
                        <input type="tel" id="phone" required maxlength="11" placeholder="请输入手机号码">
                    </div>
                    <div class="form-row">
                        <label>身份证号 <span>*</span></label>
                        <input type="text" id="idCard" required maxlength="18" placeholder="请输入18位身份证号">
                    </div>
                    <div class="form-row">
                        <label>性别 <span>*</span></label>
                        <select id="gender" required>
                            <option value="">请选择性别</option>
                            <option value="男">男</option>
                            <option value="女">女</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>驾照类型 <span>*</span></label>
                        <select id="licenseType" required>
                            <option value="C1">C1（手动挡）</option>
                            <option value="C2">C2（自动挡）</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>学车类型 <span>*</span></label>
                        <select id="studyType" required>
                            <option value="普通班">普通班</option>
                            <option value="VIP班">VIP班（更快拿证）</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>状态</label>
                        <select id="status">
                            <option value="pending">待处理</option>
                            <option value="confirmed">已确认</option>
                            <option value="completed">已完成</option>
                            <option value="cancelled">已取消</option>
                        </select>
                    </div>
                    <div class="form-row">
                        <label>备注</label>
                        <textarea id="remark" placeholder="请输入备注信息" maxlength="200"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeModal()">取消</button>
                <button class="btn btn-primary" onclick="saveEnrollment()">保存</button>
            </div>
        </div>
    </div>

    <div class="modal" id="serviceModal">
        <div class="modal-content">
            <div class="modal-header">
                <span class="modal-title" id="serviceModalTitle">添加服务</span>
                <span class="modal-close" onclick="closeServiceModal()">&times;</span>
            </div>
            <div class="modal-body">
                <form id="serviceForm">
                    <input type="hidden" id="serviceId">
                    <div class="form-row">
                        <label>标题 <span>*</span></label>
                        <input type="text" id="serviceTitle" required maxlength="100" placeholder="请输入服务标题">
                    </div>
                    <div class="form-row">
                        <label>价格</label>
                        <input type="number" id="servicePrice" placeholder="请输入价格（选填）">
                    </div>
                    <div class="form-row">
                        <label>内容 <span>*</span></label>
                        <textarea id="serviceContent" required placeholder="请输入服务内容（每行一条）"></textarea>
                    </div>
                </form>
            </div>
            <div class="modal-footer">
                <button class="btn" onclick="closeServiceModal()">取消</button>
                <button class="btn btn-primary" onclick="saveService()">保存</button>
            </div>
        </div>
    </div>

    <div class="message" id="message"></div>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>
    <div class="toast" id="toast"></div>

    <script>
        const SUPABASE_URL = 'https://iinoqavrthukxojfalnu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlpbm9xYXZydGh1a3hvamZhbG51Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NTgzNTYsImV4cCI6MjA5MjMzNDM1Nn0.iI_F4zARSfs9YpcFItw-X6gJPGe2eMK54K_xVRq0pBg';

        let sb;
        let currentPage = 1;
        let pageSize = 10;
        let totalCount = 0;
        let currentStatus = '';
        let editingId = null;

        async function initSupabase() {
            try {
                const { createClient } = supabase;
                sb = createClient(SUPABASE_URL, SUPABASE_KEY);
                const { error } = await sb.from('enrollments').select('id').limit(1);
                if (error) throw error;
                console.log('Supabase 连接成功');
                loadData();
                loadServices();
            } catch (error) {
                console.error('Supabase 初始化失败:', error);
                showMessage('数据加载失败，请刷新页面', 'error');
            }
        }

        function showMessage(text, type = 'success') {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 3000);
        }

        function showToast(text) {
            const toast = document.getElementById('toast');
            toast.textContent = text;
            toast.classList.add('show');
            setTimeout(() => { toast.classList.remove('show'); }, 2000);
        }

        async function loadData() {
            try {
                let query = sb.from('enrollments').select('*', { count: 'exact' });
                
                const status = currentStatus;
                const search = document.getElementById('searchInput').value.trim();
                const licenseType = document.getElementById('licenseFilter').value;
                const studyType = document.getElementById('studyFilter').value;
                
                if (status) {
                    query = query.eq('status', status);
                }
                if (search) {
                    query = query.or(`name.ilike.%${search}%,phone.ilike.%${search}%,id_card.ilike.%${search}%`);
                }
                if (licenseType) {
                    query = query.eq('license_type', licenseType);
                }
                if (studyType) {
                    query = query.eq('study_type', studyType);
                }
                
                const from = (currentPage - 1) * pageSize;
                const to = from + pageSize - 1;
                query = query.range(from, to).order('created_at', { ascending: false });
                
                const { data, error, count } = await query;
                
                if (error) throw error;
                
                totalCount = count || 0;
                renderTable(data || []);
                renderPagination();
                updateStats();
            } catch (error) {
                console.error('加载数据失败:', error);
                showMessage('加载数据失败', 'error');
            }
        }

        function renderTable(data) {
            const tbody = document.getElementById('tableBody');
            const emptyState = document.getElementById('emptyState');
            
            if (data.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            tbody.innerHTML = data.map(item => `
                <tr>
                    <td>${escapeHtml(item.name)}</td>
                    <td>${escapeHtml(item.phone)}</td>
                    <td>${escapeHtml(item.id_card)}</td>
                    <td>${escapeHtml(item.gender)}</td>
                    <td>${escapeHtml(item.license_type)}</td>
                    <td>${escapeHtml(item.study_type)}</td>
                    <td><span class="status-badge status-${item.status}">${getStatusText(item.status)}</span></td>
                    <td>${formatDate(item.created_at)}</td>
                    <td>
                        <div class="actions">
                            <button class="btn btn-primary btn-small" onclick="editEnrollment(${item.id})">编辑</button>
                            <button class="btn btn-danger btn-small" onclick="deleteEnrollment(${item.id})">删除</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function renderPagination() {
            const pagination = document.getElementById('pagination');
            const totalPages = Math.ceil(totalCount / pageSize);
            
            if (totalPages <= 1) {
                pagination.innerHTML = '';
                return;
            }
            
            let html = '';
            html += `<button ${currentPage === 1 ? 'disabled' : ''} onclick="goToPage(${currentPage - 1})">上一页</button>`;
            html += `<span>第 ${currentPage} / ${totalPages} 页</span>`;
            html += `<button ${currentPage === totalPages ? 'disabled' : ''} onclick="goToPage(${currentPage + 1})">下一页</button>`;
            
            pagination.innerHTML = html;
        }

        function goToPage(page) {
            const totalPages = Math.ceil(totalCount / pageSize);
            if (page < 1 || page > totalPages) return;
            currentPage = page;
            loadData();
        }

        async function updateStats() {
            try {
                const today = new Date().toISOString().split('T')[0];
                
                const { count: total } = await sb.from('enrollments').select('id', { count: 'exact', head: true });
                const { count: todayCount } = await sb.from('enrollments').select('id', { count: 'exact', head: true })
                    .gte('created_at', `${today}T00:00:00`);
                const { count: pending } = await sb.from('enrollments').select('id', { count: 'exact', head: true })
                    .eq('status', 'pending');
                
                document.getElementById('totalCount').textContent = total || 0;
                document.getElementById('todayCount').textContent = todayCount || 0;
                document.getElementById('pendingCount').textContent = pending || 0;
            } catch (error) {
                console.error('更新统计失败:', error);
            }
        }

        function openAddModal() {
            editingId = null;
            document.getElementById('modalTitle').textContent = '添加报名';
            document.getElementById('enrollmentForm').reset();
            document.getElementById('enrollmentId').value = '';
            document.getElementById('enrollmentModal').classList.add('active');
        }

        async function editEnrollment(id) {
            try {
                const { data, error } = await sb.from('enrollments').select('*').eq('id', id).single();
                if (error) throw error;
                
                editingId = id;
                document.getElementById('modalTitle').textContent = '编辑报名';
                document.getElementById('enrollmentId').value = data.id;
                document.getElementById('name').value = data.name || '';
                document.getElementById('phone').value = data.phone || '';
                document.getElementById('idCard').value = data.id_card || '';
                document.getElementById('gender').value = data.gender || '';
                document.getElementById('licenseType').value = data.license_type || 'C1';
                document.getElementById('studyType').value = data.study_type || '普通班';
                document.getElementById('status').value = data.status || 'pending';
                document.getElementById('remark').value = data.remark || '';
                
                document.getElementById('enrollmentModal').classList.add('active');
            } catch (error) {
                console.error('获取报名信息失败:', error);
                showMessage('获取信息失败', 'error');
            }
        }

        async function saveEnrollment() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const idCard = document.getElementById('idCard').value.trim().toUpperCase();
            const gender = document.getElementById('gender').value;
            const licenseType = document.getElementById('licenseType').value;
            const studyType = document.getElementById('studyType').value;
            const status = document.getElementById('status').value;
            const remark = document.getElementById('remark').value.trim();
            
            if (!name) { showMessage('请输入姓名', 'error'); return; }
            if (!phone) { showMessage('请输入手机号码', 'error'); return; }
            if (!/^1[3-9]\d{9}$/.test(phone)) { showMessage('手机号码格式不正确', 'error'); return; }
            if (!idCard) { showMessage('请输入身份证号', 'error'); return; }
            if (!/^\d{17}[\dXx]$/.test(idCard)) { showMessage('身份证号格式不正确', 'error'); return; }
            if (!gender) { showMessage('请选择性别', 'error'); return; }
            
            const loadingOverlay = document.getElementById('loadingOverlay');
            loadingOverlay.classList.add('active');
            
            try {
                const formData = {
                    name,
                    phone,
                    id_card: idCard,
                    gender,
                    license_type: licenseType,
                    study_type: studyType,
                    status,
                    remark,
                    updated_at: new Date().toISOString()
                };
                
                let error;
                if (editingId) {
                    const { error: err } = await sb.from('enrollments').update(formData).eq('id', editingId);
                    error = err;
                } else {
                    formData.created_at = new Date().toISOString();
                    const { error: err } = await sb.from('enrollments').insert([formData]);
                    error = err;
                }
                
                if (error) throw error;
                
                showMessage(editingId ? '更新成功' : '添加成功', 'success');
                closeModal();
                loadData();
            } catch (error) {
                console.error('保存失败:', error);
                showMessage('保存失败，请稍后重试', 'error');
            } finally {
                loadingOverlay.classList.remove('active');
            }
        }

        async function deleteEnrollment(id) {
            if (!confirm('确定要删除这条报名记录吗？')) return;
            
            try {
                const { error } = await sb.from('enrollments').delete().eq('id', id);
                if (error) throw error;
                showMessage('删除成功', 'success');
                loadData();
            } catch (error) {
                console.error('删除失败:', error);
                showMessage('删除失败', 'error');
            }
        }

        function closeModal() {
            document.getElementById('enrollmentModal').classList.remove('active');
            editingId = null;
        }

        async function loadServices() {
            try {
                const { data, error } = await sb.from('services').select('*').order('created_at', { ascending: false });
                if (error) throw error;
                renderServices(data || []);
            } catch (error) {
                console.error('加载服务失败:', error);
            }
        }

        function renderServices(data) {
            const tbody = document.getElementById('serviceTableBody');
            const emptyState = document.getElementById('serviceEmptyState');
            
            if (data.length === 0) {
                tbody.innerHTML = '';
                emptyState.style.display = 'block';
                return;
            }
            
            emptyState.style.display = 'none';
            tbody.innerHTML = data.map((item, index) => `
                <tr>
                    <td>${index + 1}</td>
                    <td>${escapeHtml(item.title)}</td>
                    <td>${item.price ? '¥' + item.price : '-'}</td>
                    <td>${formatDate(item.created_at)}</td>
                    <td>
                        <div class="actions">
                            <button class="btn btn-primary btn-small" onclick="editService(${item.id})">编辑</button>
                            <button class="btn btn-danger btn-small" onclick="deleteService(${item.id})">删除</button>
                            <button class="btn btn-success btn-small" onclick="copyServiceLink(${item.id})">复制链接</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function openServiceModal(id) {
            if (id) {
                editService(id);
            } else {
                document.getElementById('serviceModalTitle').textContent = '添加服务';
                document.getElementById('serviceForm').reset();
                document.getElementById('serviceId').value = '';
                document.getElementById('serviceModal').classList.add('active');
            }
        }

        async function editService(id) {
            try {
                const { data, error } = await sb.from('services').select('*').eq('id', id).single();
                if (error) throw error;
                
                document.getElementById('serviceModalTitle').textContent = '编辑服务';
                document.getElementById('serviceId').value = data.id;
                document.getElementById('serviceTitle').value = data.title || '';
                document.getElementById('servicePrice').value = data.price || '';
                document.getElementById('serviceContent').value = data.content || '';
                
                document.getElementById('serviceModal').classList.add('active');
            } catch (error) {
                console.error('获取服务信息失败:', error);
                showMessage('获取信息失败', 'error');
            }
        }

        async function saveService() {
            const title = document.getElementById('serviceTitle').value.trim();
            const price = document.getElementById('servicePrice').value;
            const content = document.getElementById('serviceContent').value.trim();
            const id = document.getElementById('serviceId').value;
            
            if (!title) { showMessage('请输入标题', 'error'); return; }
            if (!content) { showMessage('请输入内容', 'error'); return; }
            
            const loadingOverlay = document.getElementById('loadingOverlay');
            loadingOverlay.classList.add('active');
            
            try {
                const formData = {
                    title,
                    price: price ? parseFloat(price) : null,
                    content,
                    updated_at: new Date().toISOString()
                };
                
                let error;
                if (id) {
                    const { error: err } = await sb.from('services').update(formData).eq('id', id);
                    error = err;
                } else {
                    formData.created_at = new Date().toISOString();
                    const { error: err } = await sb.from('services').insert([formData]);
                    error = err;
                }
                
                if (error) throw error;
                
                showMessage(id ? '更新成功' : '添加成功', 'success');
                closeServiceModal();
                loadServices();
            } catch (error) {
                console.error('保存失败:', error);
                showMessage('保存失败', 'error');
            } finally {
                loadingOverlay.classList.remove('active');
            }
        }

        async function deleteService(id) {
            if (!confirm('确定要删除这个服务吗？')) return;
            
            try {
                const { error } = await sb.from('services').delete().eq('id', id);
                if (error) throw error;
                showMessage('删除成功', 'success');
                loadServices();
            } catch (error) {
                console.error('删除失败:', error);
                showMessage('删除失败', 'error');
            }
        }

        function closeServiceModal() {
            document.getElementById('serviceModal').classList.remove('active');
        }

        function copyServiceLink(id) {
            const link = `${window.location.origin}${window.location.pathname.replace('index.html', '')}page.html?id=${id}`;
            navigator.clipboard.writeText(link).then(() => {
                showToast('链接已复制');
            }).catch(() => {
                showToast('复制失败，请手动复制');
            });
        }

        document.querySelectorAll('.tab').forEach(tab => {
            tab.addEventListener('click', () => {
                document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
                tab.classList.add('active');
                currentStatus = tab.dataset.status;
                currentPage = 1;
                loadData();
            });
        });

        document.getElementById('searchInput').addEventListener('keypress', (e) => {
            if (e.key === 'Enter') {
                loadData();
            }
        });

        function resetSearch() {
            document.getElementById('searchInput').value = '';
            document.getElementById('licenseFilter').value = '';
            document.getElementById('studyFilter').value = '';
            currentPage = 1;
            loadData();
        }

        function formatDate(dateStr) {
            if (!dateStr) return '-';
            const date = new Date(dateStr);
            return date.toLocaleDateString('zh-CN', { year: 'numeric', month: '2-digit', day: '2-digit', hour: '2-digit', minute: '2-digit' });
        }

        function getStatusText(status) {
            const map = { pending: '待处理', confirmed: '已确认', completed: '已完成', cancelled: '已取消' };
            return map[status] || status;
        }

        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        document.addEventListener('DOMContentLoaded', initSupabase);

        document.getElementById('enrollmentModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('enrollmentModal')) {
                closeModal();
            }
        });

        document.getElementById('serviceModal').addEventListener('click', (e) => {
            if (e.target === document.getElementById('serviceModal')) {
                closeServiceModal();
            }
        });

        document.getElementById('phone').addEventListener('input', function() {
            this.value = this.value.replace(/\D/g, '');
        });

        document.getElementById('idCard').addEventListener('input', function() {
            this.value = this.value.replace(/[\w]/g, '').toUpperCase();
        });
    </script>
</body>
</html>
