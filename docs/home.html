<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <meta http-equiv="X-UA-Compatible" content="ie=edge">
    <meta name="format-detection" content="telephone=no">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <title>学车报名 - 双安驾校</title>
    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif; background: #f5f5f5; min-height: 100vh; }
        .container { max-width: 800px; margin: 0 auto; padding: 20px; padding-bottom: 100px; }
        .header { background: linear-gradient(135deg, #1890ff 0%, #0050b3 100%); color: white; padding: 30px 20px; text-align: center; border-radius: 0 0 20px 20px; margin-bottom: 20px; }
        .header h1 { font-size: 24px; margin-bottom: 8px; }
        .header p { font-size: 14px; opacity: 0.9; }
        .form-card { background: white; border-radius: 12px; padding: 24px; margin-bottom: 16px; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .form-title { font-size: 16px; font-weight: 600; color: #333; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #f0f0f0; }
        .form-item { margin-bottom: 20px; }
        .form-item:last-child { margin-bottom: 0; }
        .form-item label { display: block; font-size: 14px; color: #666; margin-bottom: 8px; }
        .form-item label span { color: #ff4d4f; margin-left: 4px; }
        .input-wrapper { position: relative; }
        .input-wrapper input, .input-wrapper select, .input-wrapper textarea { width: 100%; padding: 12px 16px; font-size: 15px; border: 1px solid #d9d9d9; border-radius: 8px; outline: none; transition: border-color 0.3s; background: #fff; }
        .input-wrapper input:focus, .input-wrapper select:focus, .input-wrapper textarea:focus { border-color: #1890ff; box-shadow: 0 0 0 2px rgba(24,144,255,0.2); }
        .input-wrapper textarea { resize: vertical; min-height: 80px; }
        .price-info { background: #fffbe6; border: 1px solid #ffe58f; border-radius: 8px; padding: 16px; margin-bottom: 20px; }
        .price-info .title { font-size: 14px; color: #ad6800; margin-bottom: 8px; }
        .price-info .price { font-size: 28px; font-weight: bold; color: #fa8c16; }
        .price-info .price span { font-size: 14px; font-weight: normal; }
        .submit-btn { display: block; width: 100%; padding: 14px; font-size: 16px; font-weight: 500; color: white; background: linear-gradient(135deg, #1890ff 0%, #0050b3 100%); border: none; border-radius: 8px; cursor: pointer; transition: opacity 0.3s; }
        .submit-btn:active { opacity: 0.8; }
        .submit-btn:disabled { background: #ccc; cursor: not-allowed; }
        .message { position: fixed; top: 20px; left: 50%; transform: translateX(-50%); padding: 12px 24px; border-radius: 8px; font-size: 14px; z-index: 1000; display: none; }
        .message.success { background: #f6ffed; border: 1px solid #b7eb8f; color: #52c41a; }
        .message.error { background: #fff2f0; border: 1px solid #ffccc7; color: #ff4d4f; }
        .loading-overlay { position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.5); display: none; justify-content: center; align-items: center; z-index: 999; }
        .loading-overlay.active { display: flex; }
        .loading-spinner { width: 40px; height: 40px; border: 3px solid #fff; border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .info-list { background: #fafafa; border-radius: 8px; padding: 16px; }
        .info-item { display: flex; justify-content: space-between; padding: 8px 0; font-size: 14px; }
        .info-item:not(:last-child) { border-bottom: 1px solid #eee; }
        .info-item .label { color: #666; }
        .info-item .value { color: #333; font-weight: 500; }
        .success-page { text-align: center; padding: 60px 20px; }
        .success-icon { width: 80px; height: 80px; margin: 0 auto 24px; background: #52c41a; border-radius: 50%; display: flex; justify-content: center; align-items: center; }
        .success-icon svg { width: 40px; height: 40px; fill: white; }
        .success-page h2 { font-size: 20px; color: #333; margin-bottom: 12px; }
        .success-page p { font-size: 14px; color: #666; }
    </style>
</head>
<body>
    <div class="container" id="formContainer">
        <div class="header">
            <h1>双安驾校</h1>
            <p>专业驾驶培训 · 轻松拿证</p>
        </div>
        
        <div class="price-info">
            <div class="title">报名费用</div>
            <div class="price">¥<span id="priceDisplay">4000</span><span>（全包）</span></div>
        </div>
        
        <div class="form-card">
            <div class="form-title">基本信息</div>
            
            <div class="form-item">
                <label>姓名 <span>*</span></label>
                <div class="input-wrapper">
                    <input type="text" id="name" placeholder="请输入您的姓名" maxlength="20">
                </div>
            </div>
            
            <div class="form-item">
                <label>手机号码 <span>*</span></label>
                <div class="input-wrapper">
                    <input type="tel" id="phone" placeholder="请输入手机号码" maxlength="11">
                </div>
            </div>
            
            <div class="form-item">
                <label>身份证号 <span>*</span></label>
                <div class="input-wrapper">
                    <input type="text" id="idCard" placeholder="请输入18位身份证号" maxlength="18">
                </div>
            </div>
            
            <div class="form-item">
                <label>性别 <span>*</span></label>
                <div class="input-wrapper">
                    <select id="gender">
                        <option value="">请选择性别</option>
                        <option value="男">男</option>
                        <option value="女">女</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="form-card">
            <div class="form-title">学车类型</div>
            
            <div class="form-item">
                <label>驾照类型 <span>*</span></label>
                <div class="input-wrapper">
                    <select id="licenseType">
                        <option value="C1">C1（手动挡）</option>
                        <option value="C2">C2（自动挡）</option>
                    </select>
                </div>
            </div>
            
            <div class="form-item">
                <label>学车类型 <span>*</span></label>
                <div class="input-wrapper">
                    <select id="studyType">
                        <option value="普通班">普通班</option>
                        <option value="VIP班">VIP班（更快拿证）</option>
                    </select>
                </div>
            </div>
        </div>
        
        <div class="form-card">
            <div class="form-title">备注信息</div>
            
            <div class="form-item">
                <label>备注（选填）</label>
                <div class="input-wrapper">
                    <textarea id="remark" placeholder="如有特殊需求，请在此说明" maxlength="200"></textarea>
                </div>
            </div>
        </div>
        
        <div class="form-card">
            <div class="form-title">报名须知</div>
            <div class="info-list">
                <div class="info-item">
                    <span class="label">报名条件</span>
                    <span class="value">18-70周岁</span>
                </div>
                <div class="info-item">
                    <span class="label">所需材料</span>
                    <span class="value">身份证、手机</span>
                </div>
                <div class="info-item">
                    <span class="label">练车时间</span>
                    <span class="value">周一至周日</span>
                </div>
                <div class="info-item">
                    <span class="label">拿证周期</span>
                    <span class="value">45-60天</span>
                </div>
            </div>
        </div>
        
        <button class="submit-btn" id="submitBtn" onclick="submitForm()">立即报名</button>
    </div>
    
    <div class="container" id="successContainer" style="display:none;">
        <div class="header">
            <h1>报名成功</h1>
            <p>感谢您的信任，我们将尽快与您联系</p>
        </div>
        <div class="form-card">
            <div class="success-page">
                <div class="success-icon">
                    <svg viewBox="0 0 24 24"><path d="M9 16.17L4.83 12l-1.42 1.41L9 19 21 7l-1.41-1.41L9 16.17z"/></svg>
                </div>
                <h2>提交成功</h2>
                <p>我们已收到您的报名信息，客服人员将在24小时内与您联系，请保持手机畅通。</p>
            </div>
        </div>
    </div>
    
    <div class="message" id="message"></div>
    <div class="loading-overlay" id="loadingOverlay">
        <div class="loading-spinner"></div>
    </div>

    <script>
        const SUPABASE_URL = 'https://iinoqavrthukxojfalnu.supabase.co';
        const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imlpbm9xYXZydGh1a3hvamZhbG51Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY3NTgzNTYsImV4cCI6MjA5MjMzNDM1Nn0.iI_F4zARSfs9YpcFItw-X6gJPGe2eMK54K_xVRq0pBg';

        let sb;
        let isSubmitting = false;

        async function initSupabase() {
            try {
                const { createClient } = supabase;
                sb = createClient(SUPABASE_URL, SUPABASE_KEY);
                const { data, error } = await sb.from('enrollments').select('id').limit(1);
                if (error) throw error;
                console.log('Supabase 连接成功');
            } catch (error) {
                console.error('Supabase 初始化失败:', error);
                showMessage('数据加载失败，请刷新重试', 'error');
            }
        }

        function showMessage(text, type = 'success') {
            const msg = document.getElementById('message');
            msg.textContent = text;
            msg.className = 'message ' + type;
            msg.style.display = 'block';
            setTimeout(() => { msg.style.display = 'none'; }, 3000);
        }

        function validateForm() {
            const name = document.getElementById('name').value.trim();
            const phone = document.getElementById('phone').value.trim();
            const idCard = document.getElementById('idCard').value.trim();
            const gender = document.getElementById('gender').value;
            
            if (!name) { showMessage('请输入姓名', 'error'); return false; }
            if (!phone) { showMessage('请输入手机号码', 'error'); return false; }
            if (!/^1[3-9]\d{9}$/.test(phone)) { showMessage('手机号码格式不正确', 'error'); return false; }
            if (!idCard) { showMessage('请输入身份证号', 'error'); return false; }
            if (!/^\d{17}[\dXx]$/.test(idCard)) { showMessage('身份证号格式不正确', 'error'); return false; }
            if (!gender) { showMessage('请选择性别', 'error'); return false; }
            
            return true;
        }

        async function submitForm() {
            if (isSubmitting) return;
            if (!validateForm()) return;
            
            isSubmitting = true;
            const btn = document.getElementById('submitBtn');
            btn.disabled = true;
            btn.textContent = '提交中...';
            document.getElementById('loadingOverlay').classList.add('active');
            
            const formData = {
                name: document.getElementById('name').value.trim(),
                phone: document.getElementById('phone').value.trim(),
                id_card: document.getElementById('idCard').value.trim().toUpperCase(),
                gender: document.getElementById('gender').value,
                license_type: document.getElementById('licenseType').value,
                study_type: document.getElementById('studyType').value,
                remark: document.getElementById('remark').value.trim(),
                status: 'pending',
                created_at: new Date().toISOString()
            };
            
            try {
                const { data, error } = await sb.from('enrollments').insert([formData]);
                if (error) throw error;
                
                document.getElementById('formContainer').style.display = 'none';
                document.getElementById('successContainer').style.display = 'block';
            } catch (error) {
                console.error('提交失败:', error);
                showMessage('提交失败，请稍后重试', 'error');
                btn.disabled = false;
                btn.textContent = '立即报名';
            } finally {
                isSubmitting = false;
                document.getElementById('loadingOverlay').classList.remove('active');
            }
        }

        document.addEventListener('DOMContentLoaded', () => {
            initSupabase();
            document.getElementById('phone').addEventListener('input', function() {
                this.value = this.value.replace(/\D/g, '');
            });
            document.getElementById('idCard').addEventListener('input', function() {
                this.value = this.value.replace(/[\w]/g, '').toUpperCase();
            });
        });
    </script>
</body>
</html>
